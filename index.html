<!DOCTYPE html>
<html>
<head>
  <title>Hutao Team</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      background-image:url("Background.png");
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      background-attachment:fixed;

      font-family:sans-serif;
      color:white;

      min-height:100vh;
    }

    .overlay{

      width:100%;
      min-height:100vh;

      background:rgba(0,0,0,0.6);

      padding:30px 20px;

      display:flex;
      flex-direction:column;
    }

    .title{

      text-align:center;
      margin-top:30px;
      margin-bottom:40px;

    }

    .title h1{

      font-size:60px;
      text-shadow:0 0 20px red;

    }

    .search-box{

      width:90%;
      max-width:700px;

      margin:auto;
      margin-bottom:40px;

    }

    .search-box input{

      width:100%;

      padding:18px;

      border:none;
      border-radius:20px;

      background:rgba(30,30,30,0.9);

      color:white;

      font-size:18px;

      outline:none;

      box-shadow:0 0 15px red;

    }

    .container{

      flex:1;
    }

    .box{

      width:90%;
      max-width:700px;

      margin:auto;
      margin-bottom:40px;

      background:rgba(20,20,20,0.8);

      border-radius:25px;

      padding:30px;

      box-shadow:0 0 20px red;

      transition:0.3s;

    }

    .box:hover{

      transform:scale(1.02);

    }

    .box h2{

      font-size:35px;
      margin-bottom:20px;

      color:#ff4444;

    }

    .box p{

      font-size:20px;
      margin-bottom:25px;

    }

    .download-btn{

      display:inline-block;

      padding:15px 35px;

      border-radius:15px;

      background:red;

      color:white;

      text-decoration:none;

      font-size:20px;
      font-weight:bold;

      box-shadow:0 0 20px red;

      transition:0.3s;

    }

    .download-btn:hover{

      transform:scale(1.08);

      background:#ff2222;

    }

    footer{

      text-align:center;

      padding-top:80px;
      padding-bottom:20px;

      font-size:18px;

      opacity:0.8;

    }

  </style>
</head>

<body>

  <div class="overlay">

    <div class="title">

      <h1>Hutao Team</h1>

    </div>




    <div class="search-box">

      <input type="text"
      id="searchInput"
      placeholder="Tìm kiếm mục...">

    </div>





    <div class="container" id="container">




      <div class="box">

        <h2># Cài Đặt Roblox</h2>

        <p>
          Delta x VNG new !!
        </p>

        <a class="download-btn"
        href="https://www.mediafire.com/"
        target="_blank">

        Tải Tệp APK

        </a>

      </div>






    </div>





    <footer>

      trang web này được tạo bởi @slkgamingssr

    </footer>

  </div>






<script>

const searchInput = document.getElementById("searchInput");

searchInput.addEventListener("keyup", function(){

  let filter = searchInput.value.toLowerCase();

  let boxes = document.getElementsByClassName("box");

  for(let i = 0; i < boxes.length; i++){

    let text = boxes[i].innerText.toLowerCase();

    if(text.includes(filter)){

      boxes[i].style.display = "";

    }else{

      boxes[i].style.display = "none";

    }

  }

});

</script>

</body>
</html>
