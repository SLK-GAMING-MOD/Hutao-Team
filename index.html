<!DOCTYPE html>
<html>
<head>
  <title>Hutao Team</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      background-image:url("Background.png");
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      background-attachment:fixed;

      font-family:sans-serif;
      color:white;

      min-height:200vh;

      backdrop-filter:brightness(0.6);
    }

    .overlay{
      width:100%;
      min-height:200vh;

      background:rgba(0,0,0,0.55);

      padding:40px 20px;
    }

    .title{

      text-align:center;
      margin-top:40px;
      margin-bottom:60px;

    }

    .title h1{

      font-size:60px;
      text-shadow:0 0 20px red;

    }

    .box{

      width:90%;
      max-width:700px;

      margin:auto;
      margin-bottom:40px;

      background:rgba(20,20,20,0.75);

      border-radius:25px;

      padding:30px;

      box-shadow:0 0 20px red;

    }

    .box h2{

      font-size:35px;
      margin-bottom:20px;

      color:#ff4444;

    }

    .box p{

      font-size:20px;
      margin-bottom:25px;

    }

    .download-btn{

      display:inline-block;

      padding:15px 35px;

      border-radius:15px;

      background:red;

      color:white;

      text-decoration:none;

      font-size:20px;
      font-weight:bold;

      box-shadow:0 0 20px red;

      transition:0.3s;

    }

    .download-btn:hover{

      transform:scale(1.08);

      background:#ff2222;

    }

    footer{

      text-align:center;

      margin-top:120px;

      padding-bottom:50px;

      font-size:18px;

      opacity:0.8;

    }

  </style>
</head>

<body>

  <div class="overlay">

    <div class="title">

      <h1>Hutao Team</h1>

    </div>





    <div class="box">

      <h2># Cài Đặt Roblox</h2>

      <p>
        Delta x VNG new !!
      </p>

      <a class="download-btn"
      href="https://www.mediafire.com/"
      target="_blank">

      Tải Tệp APK

      </a>

    </div>







    <footer>

      trang web này được tạo bởi @slkgamingssr

    </footer>

  </div>

</body>
</html>
