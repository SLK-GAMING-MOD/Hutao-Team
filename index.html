<!DOCTYPE html>
<html>
<head>
  <title>Hutao Team</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  background-image:url("Background.png");
  background-size:cover;
  background-position:center;
  background-attachment:fixed;

  font-family:sans-serif;
  color:white;

}

.overlay{

  min-height:100vh;

  background:rgba(0,0,0,0.6);

  padding:20px;

  display:flex;

  flex-direction:column;

}






.topBar{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:30px;

}






.menu-wrapper{

display:flex;

align-items:center;

gap:10px;

}






.menu-btn{

width:55px;
height:55px;

border:none;

border-radius:15px;

background:black;

cursor:pointer;

box-shadow:0 0 20px red;

display:flex;

align-items:center;

justify-content:center;

transition:0.3s;

}

.menu-btn:hover{

transform:scale(1.08);

}






.menu-btn img{

width:28px;

}






.sidebar{

position:fixed;

top:0;
left:-260px;

width:260px;
height:100%;

background:#111;

padding-top:80px;

transition:0.4s;

z-index:999;

box-shadow:0 0 25px red;

}

.sidebar.active{

left:0;

}






.closeSidebar{

position:absolute;

top:15px;
right:20px;

font-size:35px;

cursor:pointer;

}






.sidebar-content{

padding:20px;

font-size:22px;

color:white;

}






.title{

text-align:center;

margin-bottom:40px;

}

.title h1{

font-size:60px;

text-shadow:0 0 20px red;

}







.search-container{

display:flex;

align-items:center;

justify-content:flex-end;

position:relative;

}






.search-btn{

width:55px;
height:55px;

border:none;

border-radius:15px;

background:black;

cursor:pointer;

box-shadow:0 0 20px red;

display:flex;

align-items:center;

justify-content:center;

transition:0.3s;

z-index:2;

}

.search-btn:hover{

transform:scale(1.08);

}






.search-btn img{

width:28px;

}






.search-box{

position:absolute;

right:0;

width:55px;

transition:0.4s;

overflow:hidden;

}

.search-box.active{

width:260px;

}






.search-box input{

width:100%;

height:55px;

padding-left:20px;
padding-right:65px;

border:none;

border-radius:15px;

background:black;

color:white;

font-size:16px;

outline:none;

box-shadow:0 0 20px red;

}







.box{

width:90%;
max-width:700px;

margin:auto;

margin-bottom:40px;

background:rgba(20,20,20,0.8);

padding:30px;

border-radius:25px;

box-shadow:0 0 20px red;

}

.box h2{

font-size:35px;

margin-bottom:20px;

color:#ff4444;

}

.box p{

font-size:20px;

margin-bottom:25px;

}







.btn{

display:inline-block;

padding:15px 35px;

border:none;

border-radius:15px;

background:red;

color:white;

text-decoration:none;

font-size:20px;

font-weight:bold;

box-shadow:0 0 20px red;

cursor:pointer;

}







footer{

text-align:center;

margin-top:auto;

padding-top:100px;

padding-bottom:20px;

opacity:0.8;

}

</style>
</head>






<body onclick="closeOutside(event)">






<div class="sidebar" id="sidebar">

<div class="closeSidebar"
onclick="toggleMenu()">

✕

</div>

<div class="sidebar-content">

Menu

</div>

</div>






<div class="overlay">






<div class="topBar">




<div class="menu-wrapper">

<button class="menu-btn"
onclick="toggleMenu()">

<img src="menu.png">

</button>

</div>






<div class="search-container">

<div class="search-box"
id="searchBox">

<input type="text"
id="mainSearch"
placeholder="Tìm kiếm..."
onkeyup="globalSearch()">

</div>

<button class="search-btn"
onclick="toggleSearch()">

<img src="timkiem.png">

</button>

</div>

</div>






<div class="title">

<h1>Hutao Team</h1>

</div>






<div id="mainPage">

<div class="box mainBox">

<h2># Cài Đặt Roblox</h2>

<p>
Delta x VNG new !!
</p>

<a class="btn"
href="https://www.mediafire.com/"
target="_blank">

Tải Tệp APK

</a>

</div>

</div>







<footer>

trang web này được tạo bởi @slkgamingssr

</footer>

</div>









<script>

function toggleMenu(){

document.getElementById("sidebar")
.classList.toggle("active");

}







function toggleSearch(){

document.getElementById("searchBox")
.classList.toggle("active");

}







function globalSearch(){

let input =
document.getElementById("mainSearch")
.value.toLowerCase();

let boxes =
document.getElementsByClassName("mainBox");

for(let i=0;i<boxes.length;i++){

let text =
boxes[i].innerText.toLowerCase();

boxes[i].style.display =
text.includes(input)
? ""
: "none";

}

}







function closeOutside(event){

let sidebar =
document.getElementById("sidebar");

let menuBtn =
document.querySelector(".menu-btn");

if(
!sidebar.contains(event.target)
&&
!menuBtn.contains(event.target)
){

sidebar.classList.remove("active");

}

}

</script>

</body>
</html>
