<!DOCTYPE html>
<html>
<head>
  <title>Hutao Team</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  background-image:url("Background.png");
  background-size:cover;
  background-position:center;
  background-attachment:fixed;

  font-family:sans-serif;
  color:white;

}

.overlay{

  min-height:100vh;

  background:rgba(0,0,0,0.6);

  padding:20px;

}






.menu-btn{

  font-size:35px;

  cursor:pointer;

  width:60px;

  text-align:center;

  margin-bottom:20px;

}

.sidebar{

  position:fixed;

  top:0;
  left:-250px;

  width:250px;
  height:100%;

  background:#111;

  padding-top:80px;

  transition:0.3s;

  z-index:999;

}

.sidebar a{

  display:block;

  padding:20px;

  color:white;

  text-decoration:none;

  font-size:22px;

  border-bottom:1px solid #333;

}

.sidebar a:hover{

  background:red;

}

.sidebar.active{

  left:0;

}






.title{

  text-align:center;

  margin-bottom:40px;

}

.title h1{

  font-size:60px;

  text-shadow:0 0 20px red;

}







.search-box{

  width:90%;
  max-width:700px;

  margin:auto;

  margin-bottom:40px;

}

.search-box input{

  width:100%;

  padding:18px;

  border:2px solid red;

  border-radius:20px;

  background:black;

  color:white;

  font-size:18px;

  outline:none;

  box-shadow:0 0 20px red;

}







.box{

  width:90%;
  max-width:700px;

  margin:auto;

  margin-bottom:40px;

  background:rgba(20,20,20,0.8);

  padding:30px;

  border-radius:25px;

  box-shadow:0 0 20px red;

}

.box h2{

  font-size:35px;

  margin-bottom:20px;

  color:#ff4444;

}

.box p{

  font-size:20px;

  margin-bottom:25px;

}







.btn{

  display:inline-block;

  padding:15px 35px;

  border-radius:15px;

  background:red;

  color:white;

  text-decoration:none;

  font-size:20px;

  font-weight:bold;

  box-shadow:0 0 20px red;

}







footer{

  text-align:center;

  margin-top:100px;

  padding-bottom:20px;

  opacity:0.8;

}







#shopPage{

  display:none;

}

</style>
</head>

<body>






<div class="sidebar" id="sidebar">

  <a href="#" onclick="showMain()">Main</a>

  <a href="#" onclick="showShop()">Shop</a>

</div>






<div class="overlay">

<div class="menu-btn"
onclick="toggleMenu()">

☰

</div>






<div class="title">

  <h1>Hutao Team</h1>

</div>






<div id="mainPage">





<div class="search-box">

<input type="text"
id="mainSearch"
placeholder="Tìm mục bên Main..."
onkeyup="searchMain()">

</div>






<div class="box mainBox">

<h2># Cài Đặt Roblox</h2>

<p>
Delta x VNG new !!
</p>

<a class="btn"
href="https://www.mediafire.com/"
target="_blank">

Tải Tệp APK

</a>

</div>






</div>









<div id="shopPage">





<div class="search-box">

<input type="text"
id="shopSearch"
placeholder="Tìm mục bên Shop..."
onkeyup="searchShop()">

</div>






<div class="box shopBox">

<h2># mua script premium</h2>

<p>
script forsaken premium :
</p>

<a class="btn"
href="qr.png"
target="_blank">

Mua

</a>

</div>






</div>







<footer>

trang web này được tạo bởi @slkgamingssr

</footer>

</div>









<script>

function toggleMenu(){

  document.getElementById("sidebar")
  .classList.toggle("active");

}







function showMain(){

  document.getElementById("mainPage")
  .style.display="block";

  document.getElementById("shopPage")
  .style.display="none";

}







function showShop(){

  document.getElementById("mainPage")
  .style.display="none";

  document.getElementById("shopPage")
  .style.display="block";

}







function searchMain(){

let input =
document.getElementById("mainSearch")
.value.toLowerCase();

let boxes =
document.getElementsByClassName("mainBox");

for(let i=0;i<boxes.length;i++){

let text =
boxes[i].innerText.toLowerCase();

boxes[i].style.display =
text.includes(input)
? ""
: "none";

}

}







function searchShop(){

let input =
document.getElementById("shopSearch")
.value.toLowerCase();

let boxes =
document.getElementsByClassName("shopBox");

for(let i=0;i<boxes.length;i++){

let text =
boxes[i].innerText.toLowerCase();

boxes[i].style.display =
text.includes(input)
? ""
: "none";

}

}

</script>

</body>
</html>
