<!DOCTYPE html>
<html>
<head>
  <title>Hutao Team</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  background-image:url("Background.png");
  background-size:cover;
  background-position:center;
  background-attachment:fixed;

  font-family:sans-serif;
  color:white;

}

.overlay{

  min-height:100vh;

  background:rgba(0,0,0,0.6);

  padding:20px;

  display:flex;

  flex-direction:column;

}






.topBar{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:30px;

}






.menu-btn{

  font-size:35px;

  cursor:pointer;

  width:60px;

  text-align:center;

}






.sidebar{

  position:fixed;

  top:0;
  left:-250px;

  width:250px;
  height:100%;

  background:#111;

  padding-top:80px;

  transition:0.3s;

  z-index:999;

}

.sidebar a{

  display:block;

  padding:20px;

  color:white;

  text-decoration:none;

  font-size:22px;

  border-bottom:1px solid #333;

}

.sidebar a:hover{

  background:red;

}

.sidebar.active{

  left:0;

}






.closeSidebar{

position:absolute;

top:15px;
right:20px;

font-size:35px;

cursor:pointer;

}






.title{

  text-align:center;

  margin-bottom:40px;

}

.title h1{

  font-size:60px;

  text-shadow:0 0 20px red;

}







.search-box{

  width:250px;

}

.search-box input{

  width:100%;

  padding:15px;

  border:2px solid red;

  border-radius:20px;

  background:black;

  color:white;

  font-size:16px;

  outline:none;

  box-shadow:0 0 20px red;

}







.box{

  width:90%;
  max-width:700px;

  margin:auto;

  margin-bottom:40px;

  background:rgba(20,20,20,0.8);

  padding:30px;

  border-radius:25px;

  box-shadow:0 0 20px red;

}

.box h2{

  font-size:35px;

  margin-bottom:20px;

  color:#ff4444;

}

.box p{

  font-size:20px;

  margin-bottom:25px;

}







.btn{

  display:inline-block;

  padding:15px 35px;

  border:none;

  border-radius:15px;

  background:red;

  color:white;

  text-decoration:none;

  font-size:20px;

  font-weight:bold;

  box-shadow:0 0 20px red;

  cursor:pointer;

}







footer{

  text-align:center;

  margin-top:auto;

  padding-top:100px;

  padding-bottom:20px;

  opacity:0.8;

}







#shopPage{

  display:none;

}







#qrGui{

display:none;

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.8);

justify-content:center;
align-items:center;

z-index:2000;

}







#qrBox{

background:#111;

padding:30px;

border-radius:25px;

text-align:center;

width:90%;
max-width:400px;

box-shadow:0 0 25px red;

position:relative;

}







#closeQR{

position:absolute;

top:15px;
right:20px;

font-size:30px;

cursor:pointer;

}







#qrImage{

width:100%;

border-radius:15px;

margin-top:20px;
margin-bottom:20px;

}







#confirmBtn{

padding:15px 25px;

border:none;

border-radius:15px;

background:red;

color:white;

font-size:18px;

box-shadow:0 0 15px red;

cursor:pointer;

}







#confirmText{

margin-top:20px;

font-size:18px;

color:#00ff66;

}

</style>
</head>






<body onclick="closeOutside(event)">






<div class="sidebar" id="sidebar">

<div class="closeSidebar"
onclick="toggleMenu()">

✕

</div>

  <a href="#" onclick="showMain()">Main</a>

  <a href="#" onclick="showShop()">Shop</a>

</div>






<div class="overlay">






<div class="topBar">

<div class="menu-btn"
onclick="toggleMenu()">

☰

</div>






<div class="search-box">

<input type="text"
id="mainSearch"
placeholder="Tìm kiếm..."
onkeyup="globalSearch()">

</div>

</div>






<div class="title">

  <h1>Hutao Team</h1>

</div>






<div id="mainPage">






<div class="box mainBox">

<h2># Cài Đặt Roblox</h2>

<p>
Delta x VNG new !!
</p>

<a class="btn"
href="https://www.mediafire.com/"
target="_blank">

Tải Tệp APK

</a>

</div>






</div>









<div id="shopPage">






<div class="box shopBox">

<h2># mua script premium</h2>

<p>
script forsaken premium :
</p>

<button class="btn"
onclick="openQR()">

Mua Với Giá 100K

</button>

</div>






</div>







<div id="qrGui">

<div id="qrBox">

<div id="closeQR"
onclick="closeQR()">

✕

</div>

<h2>

hãy thanh toán đơn hàng này

</h2>

<img src="qr.png"
id="qrImage">

<button id="confirmBtn"
onclick="confirmPayment()">

Xác Nhận Thanh Toán

</button>

<p id="confirmText"></p>

</div>

</div>







<footer>

trang web này được tạo bởi @slkgamingssr

</footer>

</div>









<script>

function toggleMenu(){

  document.getElementById("sidebar")
  .classList.toggle("active");

}







function showMain(){

  document.getElementById("mainPage")
  .style.display="block";

  document.getElementById("shopPage")
  .style.display="none";

}







function showShop(){

  document.getElementById("mainPage")
  .style.display="none";

  document.getElementById("shopPage")
  .style.display="block";

}







function globalSearch(){

let input =
document.getElementById("mainSearch")
.value.toLowerCase();

if(
document.getElementById("mainPage")
.style.display != "none"
){

let boxes =
document.getElementsByClassName("mainBox");

for(let i=0;i<boxes.length;i++){

let text =
boxes[i].innerText.toLowerCase();

boxes[i].style.display =
text.includes(input)
? ""
: "none";

}

}else{

let boxes =
document.getElementsByClassName("shopBox");

for(let i=0;i<boxes.length;i++){

let text =
boxes[i].innerText.toLowerCase();

boxes[i].style.display =
text.includes(input)
? ""
: "none";

}

}

}







function closeOutside(event){

let sidebar =
document.getElementById("sidebar");

let menuBtn =
document.querySelector(".menu-btn");

if(
!sidebar.contains(event.target)
&&
!menuBtn.contains(event.target)
){

sidebar.classList.remove("active");

}

}







function openQR(){

document.getElementById("qrGui")
.style.display="flex";

}







function closeQR(){

document.getElementById("qrGui")
.style.display="none";

}







function confirmPayment(){

document.getElementById("confirmText")
.innerHTML =
"đơn hàng của bạn sẽ được xử lí sau 24h";

}

</script>

</body>
</html>
