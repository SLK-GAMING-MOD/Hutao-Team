<!DOCTYPE html>  
<html lang="en">  
<head>  
<meta charset="UTF-8"/>  
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>  
  
<title>Hutao Team</title>  
  
<link rel="preconnect" href="https://fonts.googleapis.com">  
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>  
  
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">  
  
<style>  
  
:root{  
  --bg:#070B12;  
  --bg2:#0E131D;  
  --card:#111826;  
  --border:#1B2535;  
  
  --text:#F2F5FF;  
  --text2:#9AA4B5;  
  
  --cyan:#00E5FF;  
  --blue:#4F7CFF;  
  --purple:#8B5CFF;  
  
  --glow: 0 0 30px rgba(0,229,255,.25);  
}  
  
*{  
  margin:0;  
  padding:0;  
  box-sizing:border-box;  
}  
  
html{  
  scroll-behavior:smooth;  
}  
  
body{  
  background:var(--bg);  
  color:var(--text);  
  font-family:'Space Grotesk',sans-serif;  
  overflow-x:hidden;  
}  
  
.bg-blur{  
  position:fixed;  
  width:600px;  
  height:600px;  
  border-radius:50%;  
  filter:blur(120px);  
  z-index:-1;  
  opacity:.22;  
}  
  
.bg1{ background:var(--cyan); top:-200px; left:-150px; }  
.bg2{ background:var(--purple); right:-180px; top:120px; }  
  
nav{  
  position:sticky;  
  top:0;  
  z-index:1000;  
  padding:14px 6%;  
  display:flex;  
  align-items:center;  
  justify-content:space-between;  
  backdrop-filter:blur(18px);  
  background:rgba(7,11,18,.72);  
  border-bottom:1px solid rgba(255,255,255,.05);  
}  
  
.logo-wrap{  
  display:flex;  
  align-items:center;  
  gap:18px;  
  margin-left:-12px;  
}  
  
.logo-icon{  
  width:44px;  
  height:44px;  
  border-radius:14px;  
  display:flex;  
  align-items:center;  
  justify-content:center;  
  overflow:hidden;  
  background:linear-gradient(135deg,rgba(0,229,255,.2),rgba(139,92,255,.2));  
  border:1px solid rgba(255,255,255,.08);  
  box-shadow:var(--glow);  
}  
  
.logo-icon img{  
  width:100%;  
  height:100%;  
  object-fit:cover;  
}  
  
.logo{  
  font-size:25px;  
  font-weight:700;  
  letter-spacing:.5px;  
  background:linear-gradient(90deg,var(--cyan),var(--purple));  
  -webkit-background-clip:text;  
  -webkit-text-fill-color:transparent;  
}  
  
.nav-links{  
  display:flex;  
  gap:28px;  
}  
  
.nav-links a{  
  color:var(--text2);  
  text-decoration:none;  
  transition:.3s;  
  font-size:15px;  
}  
  
.nav-links a:hover{ color:var(--cyan); }  
  
.hero{  
  min-height:82vh;  
  display:flex;  
  align-items:center;  
  justify-content:center;  
  text-align:center;  
  padding:40px 7% 0;  
}  
  
.hero-content{ max-width:920px; }  
  
.badge{  
  display:inline-flex;  
  align-items:center;  
  gap:10px;  
  padding:10px 18px;  
  border-radius:999px;  
  border:1px solid rgba(0,229,255,.2);  
  background:rgba(255,255,255,.03);  
  color:var(--cyan);  
  margin-bottom:22px;  
}  
  
.badge-dot{  
  width:8px;  
  height:8px;  
  border-radius:50%;  
  background:var(--cyan);  
  box-shadow:0 0 12px var(--cyan);  
}  
  
.hero h1{  
  font-size:82px;  
  line-height:1;  
  margin-bottom:18px;  
}  
  
.hero h1 span{  
  background:linear-gradient(90deg,var(--cyan),var(--purple));  
  -webkit-background-clip:text;  
  -webkit-text-fill-color:transparent;  
}  
  
.hero p{  
  max-width:720px;  
  margin:auto;  
  color:var(--text2);  
  font-size:20px;  
  line-height:1.7;  
}  
  
.hero-buttons{  
  margin-top:30px;  
  display:flex;  
  justify-content:center;  
  gap:18px;  
  flex-wrap:wrap;  
}  
  
.btn,  
.download-btn{  
  position:relative;  
  z-index:5;  
  pointer-events:auto;  
}  
  
.btn{  
  padding:16px 28px;  
  border-radius:16px;  
  text-decoration:none;  
  font-weight:600;  
  transition:.35s;  
}  
  
.btn-primary{  
  background:linear-gradient(90deg,var(--cyan),var(--blue));  
  color:#000;  
  box-shadow:var(--glow);  
}  
  
.btn-primary:hover{ transform:translateY(-4px); }  
  
.btn-outline{  
  border:1px solid rgba(255,255,255,.1);  
  color:var(--text);  
  background:rgba(255,255,255,.03);  
}  
  
.btn-outline:hover{  
  border-color:var(--cyan);  
  color:var(--cyan);  
}  
  
.stats{  
  margin-top:55px;  
  display:flex;  
  justify-content:center;  
  gap:18px;  
  flex-wrap:wrap;  
}  
  
.stat-box{  
  min-width:180px;  
  padding:22px;  
  border-radius:22px;  
  background:rgba(255,255,255,.03);  
  border:1px solid rgba(255,255,255,.05);  
}  
  
.stat-box h3{  
  font-size:34px;  
  background:linear-gradient(90deg,var(--cyan),var(--purple));  
  -webkit-background-clip:text;  
  -webkit-text-fill-color:transparent;  
}  
  
.stat-box p{  
  color:var(--text2);  
  margin-top:8px;  
  font-size:14px;  
}  
  
.section{ padding:75px 7%; }  
  
.section-top{  
  text-align:center;  
  margin-bottom:45px;  
}  
  
.section-top span{  
  color:var(--cyan);  
  font-size:13px;  
  letter-spacing:2px;  
}  
  
.section-top h2{  
  font-size:52px;  
  margin-top:14px;  
}  
  
.section-top p{  
  color:var(--text2);  
  margin-top:12px;  
}  
  
.grid{  
  display:grid;  
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));  
  gap:24px;  
}  
  
.card{  
  position:relative;  
  overflow:hidden;  
  background:rgba(255,255,255,.03);  
  border:1px solid rgba(255,255,255,.05);  
  border-radius:28px;  
  padding:28px;  
  transition:.35s;  
}  
  
.card::before{  
  content:"";  
  position:absolute;  
  inset:0;  
  background:linear-gradient(140deg,rgba(0,229,255,.08),transparent,rgba(139,92,255,.08));  
  opacity:0;  
  transition:.35s;  
  pointer-events:none;  
}  
  
.card:hover::before{ opacity:1; }  
  
.card:hover{  
  transform:translateY(-8px);  
  border-color:rgba(0,229,255,.18);  
}  
  
.card-icon{  
  width:60px;  
  height:60px;  
  border-radius:18px;  
  display:flex;  
  align-items:center;  
  justify-content:center;  
  background:rgba(0,229,255,.08);  
  font-size:28px;  
  margin-bottom:22px;  
}  
  
.card h3{ font-size:24px; margin-bottom:12px; }  
  
.card p{  
  color:var(--text2);  
  line-height:1.7;  
}  
  
.download-card{  
  overflow:hidden;  
  border-radius:28px;  
  border:1px solid rgba(255,255,255,.06);  
  background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));  
  transition:.35s;  
}  
  
.download-card:hover{  
  transform:translateY(-8px);  
  border-color:rgba(0,229,255,.2);  
}  
  
.download-image{  
  height:180px;  
  display:flex;  
  align-items:center;  
  justify-content:center;  
  font-size:60px;  
  background:linear-gradient(135deg,rgba(0,229,255,.16),rgba(139,92,255,.18));  
}  
  
.download-content{ padding:24px; }  
  
.download-content h3{ margin-bottom:10px; font-size:24px; }  
  
.download-content p{  
  color:var(--text2);  
  line-height:1.7;  
  margin-bottom:22px;  
}  
  
.download-btn{  
  display:inline-block;  
  padding:14px 22px;  
  border-radius:14px;  
  text-decoration:none;  
  color:var(--cyan);  
  background:rgba(0,229,255,.08);  
  border:1px solid rgba(0,229,255,.22);  
  transition:.3s;  
}  
  
.download-btn:hover{  
  background:var(--cyan);  
  color:#000;  
}  
  
.community-card{  
  text-align:center;  
  padding:55px 30px;  
}  
  
.community-card h2{  
  font-size:52px;  
  margin-bottom:18px;  
}  
  
.community-card p{  
  max-width:700px;  
  margin:auto;  
  color:var(--text2);  
  line-height:1.8;  
}  
  
footer{  
  padding:32px 7%;  
  border-top:1px solid rgba(255,255,255,.05);  
  display:flex;  
  justify-content:space-between;  
  align-items:center;  
  flex-wrap:wrap;  
  gap:20px;  
}  
  
footer p{ color:var(--text2); }  
  
.footer-links{  
  display:flex;  
  gap:18px;  
}  
  
.footer-links a{  
  color:var(--text2);  
  text-decoration:none;  
  transition:.3s;  
}  
  
.footer-links a:hover{ color:var(--cyan); }  
  
@media(max-width:900px){  
  .hero{ min-height:auto; padding-top:70px; }  
  .hero h1{ font-size:56px; }  
  .hero p{ font-size:17px; }  
  .section-top h2{ font-size:38px; }  
  .nav-links{ display:none; }  
  .stats{ gap:12px; }  
  .stat-box{ width:100%; }  
}  
  
</style>  
</head>  
  
<body>  
  
<div class="bg-blur bg1"></div>  
<div class="bg-blur bg2"></div>  
  
<nav>  
<div class="logo-wrap">  
<div class="logo-icon">  
<img src="hutaoteam.png" alt="logo">  
</div>  
<div class="logo">Hutao Team</div>  
</div>  
  
<div class="nav-links">  
<a href="#">Home</a>  
<a href="#">APK</a>  
<a href="#">Scripts</a>  
<a href="#">Executors</a>  
<a href="#">Community</a>  
</div>  
</nav>  
  
<!-- phần còn lại giữ nguyên -->  
  
</body>  
</html>
